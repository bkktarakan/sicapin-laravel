name: Deploy Laravel via FTP

on:
  push:
    branches:
      - main # Akan berjalan saat ada push ke branch main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🔧 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2' # Sesuaikan dengan versi PHP di hosting Anda

    - name: 📦 Install Dependencies (Composer)
      run: composer install --no-dev --optimize-autoloader --prefer-dist

    - name: 📦 Install NPM Dependencies & Build
      run: |
        npm ci
        npm run build

    - name: 📦 Prepare Deployment Files (ZIP)
      run: |
        # Buat file unzipper di dalam folder public
        cat << 'EOF' > public/unzip.php
        <?php
        $zip = new ZipArchive;
        if ($zip->open(__DIR__ . '/../release.zip') === TRUE) {
            $zip->extractTo(__DIR__ . '/../');
            $zip->close();
            echo "Ekstrak berhasil. ";
            
            // Hapus cache Laravel agar membaca route & config terbaru
            $cacheFiles = glob(__DIR__ . '/../bootstrap/cache/*.php');
            foreach($cacheFiles as $file){
                if(basename($file) !== '.gitignore') {
                    @unlink($file);
                }
            }
            
            // Jalankan Migrasi Database Otomatis
            try {
                require __DIR__.'/../vendor/autoload.php';
                $app = require_once __DIR__.'/../bootstrap/app.php';
                $kernel = $app->make(Illuminate\Contracts\Console\Kernel::class);
                $kernel->bootstrap();
                \Illuminate\Support\Facades\Artisan::call('migrate', ['--force' => true]);
                echo "Migrasi Selesai: " . \Illuminate\Support\Facades\Artisan::output();
            } catch (\Exception $e) {
                echo "Gagal migrasi: " . $e->getMessage();
            }

        } else {
            echo "Gagal membuka file ZIP. ";
            http_response_code(500);
        }
        // Hapus jejak
        @unlink(__DIR__ . '/../release.zip');
        @unlink(__FILE__);
        ?>
        EOF
        
        # Zip semua file (kecuali folder git dan file rahasia)
        zip -r release.zip . -x ".git/*" ".github/*" "node_modules/*" "tests/*" "storage/framework/cache/*"
        
        # Pindahkan ke folder kosong agar FTP hanya mengirim 2 file ini sesuai struktur
        mkdir -p deploy_dist/public
        mv release.zip deploy_dist/
        mv public/unzip.php deploy_dist/public/

    - name: 📂 Sync files via FTP (Hanya 2 File)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./
        local-dir: ./deploy_dist/

    - name: 🚀 Ekstrak file di Hosting
      run: |
        # Memanggil file PHP di hosting untuk mengekstrak ZIP
        # Ganti URL ini jika nama domain Anda berbeda
        curl -sL "https://sicapin.bkktarakan.id/unzip.php"
