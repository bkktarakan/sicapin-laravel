name: Deploy Laravel via FTP

on:
  push:
    branches:
      - main # Akan berjalan saat ada push ke branch main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🔧 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2' # Sesuaikan dengan versi PHP di hosting Anda

    - name: 📦 Install Dependencies (Composer)
      run: composer install --no-dev --optimize-autoloader --prefer-dist

    - name: 📦 Install NPM Dependencies & Build
      run: |
        npm ci
        npm run build

    - name: 📂 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Isi secret FTP_SERVER_DIR dengan folder tujuan di hosting, contoh: /public_html/
        server-dir: ${{ secrets.FTP_SERVER_DIR }}
        exclude: |
          **/.git*
          **/.git*/**
          **/.github/**
          **/node_modules/**
          **/tests/**
          .env
          .env.example
          .env.backup
          .env.production
          storage/app/**
          storage/framework/**
          storage/logs/**
          storage/pail/**
          public/storage
