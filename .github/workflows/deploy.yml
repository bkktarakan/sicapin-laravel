name: Deploy Laravel via FTP

on:
  push:
    branches:
      - main # Akan berjalan saat ada push ke branch main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🔧 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2' # Sesuaikan dengan versi PHP di hosting Anda

    - name: 📦 Install Dependencies (Composer)
      run: composer install --no-dev --optimize-autoloader --prefer-dist

    - name: 📦 Install NPM Dependencies & Build
      run: |
        npm ci
        npm run build

    - name: 📂 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./
        local-dir: ./
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/tests/**
          **/deploy_dist/**
          storage/framework/cache/**
          storage/framework/views/**
          storage/framework/sessions/**

    - name: 🚀 Jalankan Migrasi di Hosting
      run: |
        # Memanggil file PHP di hosting untuk menjalankan migrasi
        curl -sL "https://sicapin.bkktarakan.id/public/migrate.php"
